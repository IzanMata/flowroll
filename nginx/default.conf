# nginx/default.conf — reverse proxy for FlowRoll
# Serves static/media files directly; forwards everything else to Gunicorn.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

# Proxy buffer settings
proxy_buffers 16 64k;
proxy_buffer_size 128k;
proxy_busy_buffers_size 256k;
proxy_temp_file_write_size 256k;

upstream gunicorn {
    # "web" resolves to the Docker service — keep the port matching Gunicorn's bind
    server web:8000 max_fails=3 fail_timeout=30s;
    # Add more lines here to manually load-balance across scaled web replicas:
    # server web_2:8000 max_fails=3 fail_timeout=30s;
}

# ─── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;                        # Replace with your domain in production

    # Large body for media uploads
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static files (Django collectstatic output) ──
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── User-uploaded media ──
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ── Let's Encrypt ACME challenge (uncomment when adding HTTPS) ──
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # ── Authentication endpoints (stricter rate limiting) ──
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_buffering    on;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── API endpoints (moderate rate limiting) ──
    location ~ ^/api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_buffering    on;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── All other requests go to Gunicorn ──
    location / {
        limit_req zone=general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://gunicorn;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_redirect     off;
        proxy_buffering    on;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # WebSocket support (needed if you add Django Channels later)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

