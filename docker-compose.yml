# FlowRoll — production docker-compose
# Deploy: git clone → cp .env.example .env → docker compose up -d --build
#
# Scale workers:  docker compose up -d --scale worker=3
# Scale web:      docker compose up -d --scale web=2  (requires external LB)

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend

  # ─── Django / Gunicorn ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["web"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/schema/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend
      - frontend

  # ─── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["worker"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Scale with: docker compose up -d --scale worker=3
    deploy:
      replicas: 1
    networks:
      - backend

  # ─── Celery beat ────────────────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["beat"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Only ONE beat instance must ever run — never scale this service
    networks:
      - backend

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: docker.io/library/nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      # Uncomment for HTTPS (requires certbot setup):
      # - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      # Uncomment for Let's Encrypt:
      # - certbot_www:/var/www/certbot:ro
      # - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - frontend

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  # Uncomment for Let's Encrypt:
  # certbot_www:
  # certbot_certs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  # backend: internal — postgres, redis, gunicorn, celery talk here
  backend:
    driver: bridge
    internal: true
  # frontend: public — only nginx and web are on this network
  frontend:
    driver: bridge
