# FlowRoll — production docker-compose
# Deploy: git clone → cp .env.example .env → docker compose up -d --build
#
# Scale workers:  docker compose up -d --scale worker=3
# Scale web:      docker compose up -d --scale web=2  (requires external LB)

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "512M"
        reservations:
          memory: "256M"
    networks:
      - backend

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
        reservations:
          memory: "64M"
    networks:
      - backend

  # ─── Django / Gunicorn ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["web"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),timeout=5); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "512M"
        reservations:
          memory: "256M"
    networks:
      - backend
      - frontend

  # ─── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["worker"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Scale with: docker compose up -d --scale worker=3
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          memory: "256M"
    networks:
      - backend

  # ─── Celery beat ────────────────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["beat"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Only ONE beat instance must ever run — never scale this service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from django_celery_beat.models import PeriodicTask; print('Scheduler OK')\" || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
        reservations:
          memory: "128M"
    networks:
      - backend

  # ─── Next.js (BFF + frontend) ───────────────────────────────────────────────
  nextjs:
    build:
      context: ../flowroll_web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://web:8000
    expose:
      - "3000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          memory: "256M"
    networks:
      - backend
      - frontend

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: docker.io/library/nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS (requires certbot setup):
      # - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      # Uncomment for Let's Encrypt:
      # - certbot_www:/var/www/certbot:ro
      # - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - nextjs
      - web
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "64M"
        reservations:
          memory: "32M"
    networks:
      - frontend

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  # Uncomment for Let's Encrypt:
  # certbot_www:
  # certbot_certs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  # backend: internal — postgres, redis, gunicorn, celery talk here
  backend:
    driver: bridge
    internal: true
  # frontend: public — only nginx and web are on this network
  frontend:
    driver: bridge
